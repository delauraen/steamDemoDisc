<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo Disc</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0e0c0a;
    --surface:  #181411;
    --border:   #2a2420;
    --border-hi:#3d3530;
    --gold:     #c8922a;
    --gold-lt:  #e8b44a;
    --gold-dk:  #8a5f14;
    --cream:    #f0e8d8;
    --muted:    #7a6e62;
    --red:      #c0392b;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 180px 180px;
  }

  .page-wrap {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 52px 20px 72px;
  }

  /* ── Header ── */
  .site-header { text-align: center; margin-bottom: 48px; }

  .disc-ring {
    width: 68px; height: 68px;
    margin: 0 auto 18px;
  }
  .disc-ring svg {
    width: 100%; height: 100%;
    animation: slowspin 10s linear infinite;
    animation-play-state: paused;
  }
  .disc-ring svg.spinning { animation-play-state: running; }
  @keyframes slowspin { to { transform: rotate(360deg); } }

  .site-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 12vw, 84px);
    letter-spacing: 6px;
    color: var(--cream);
    line-height: 1;
    display: inline-block;
  }
  .site-name::after {
    content: '';
    display: block;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin-top: 6px;
  }

  .site-sub {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 10px;
  }

  /* ── Main ── */
  .main { width: 100%; max-width: 520px; }

  /* ── Spin button ── */
  .spin-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    width: 100%;
    padding: 18px 32px;
    background: transparent;
    border: 1px solid var(--gold-dk);
    color: var(--gold-lt);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 4px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, color 0.2s;
    margin-bottom: 28px;
  }
  .spin-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--gold-dk);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.25s ease;
    z-index: 0;
  }
  .spin-btn:hover::before { transform: scaleX(1); }
  .spin-btn:hover { color: #0e0c0a; border-color: var(--gold); }
  .spin-btn > * { position: relative; z-index: 1; }
  .spin-btn:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

  /* ── Loading ── */
  .loading { display: none; text-align: center; padding: 44px 0; color: var(--muted); }
  .loading.visible { display: block; }
  .loading-label { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 16px; }
  .loading-track { width: 160px; height: 1px; background: var(--border); margin: 0 auto; overflow: hidden; }
  .loading-bar { height: 100%; background: var(--gold); animation: sweep 1.4s ease-in-out infinite; }
  @keyframes sweep {
    0%   { transform: translateX(-100%) scaleX(0.4); }
    50%  { transform: translateX(60%)   scaleX(1); }
    100% { transform: translateX(300%) scaleX(0.4); }
  }

  /* ── Error ── */
  .error-msg {
    display: none;
    background: rgba(192,57,43,0.07);
    border: 1px solid rgba(192,57,43,0.28);
    color: #df7060;
    font-size: 13px;
    padding: 14px 18px;
    text-align: center;
    letter-spacing: 0.5px;
    line-height: 1.5;
    margin-bottom: 20px;
  }
  .error-msg.visible { display: block; }

  /* ── Game card ── */
  .game-card {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
    animation: fadeup 0.35s ease both;
  }
  .game-card.visible { display: block; }

  @keyframes fadeup {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .game-card::before, .game-card::after {
    content: ''; position: absolute;
    width: 16px; height: 16px; z-index: 2;
  }
  .game-card::before { top: 0; left: 0; border-top: 1px solid var(--gold-dk); border-left: 1px solid var(--gold-dk); }
  .game-card::after  { bottom: 0; right: 0; border-bottom: 1px solid var(--gold-dk); border-right: 1px solid var(--gold-dk); }

  .card-img-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 460 / 215;
    background: #111;
    overflow: hidden;
  }

  .card-img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .card-img.loaded { opacity: 1; }

  .card-img-placeholder {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }

  .card-img-wrap::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, transparent 45%, rgba(24,20,17,0.9) 100%);
    pointer-events: none; z-index: 1;
  }

  .card-tags {
    position: absolute; bottom: 10px; left: 14px;
    display: flex; flex-wrap: wrap; gap: 5px;
    z-index: 2;
  }
  .tag {
    background: rgba(14,12,10,0.78);
    border: 1px solid var(--border-hi);
    color: var(--muted);
    font-size: 10px; letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 3px 8px;
    backdrop-filter: blur(4px);
  }
  .tag-free {
    background: rgba(200,146,42,0.12);
    border-color: var(--gold-dk);
    color: var(--gold-lt);
  }

  .card-body { padding: 22px 24px 24px; }

  .card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px; letter-spacing: 2px;
    color: var(--cream); line-height: 1.1;
    margin-bottom: 4px;
  }
  .card-dev {
    font-size: 11px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--gold);
    margin-bottom: 14px;
  }
  .card-desc {
    font-size: 14px; line-height: 1.75;
    color: #b8ad9e; margin-bottom: 20px;
    border-left: 2px solid var(--gold-dk);
    padding-left: 14px;
  }

  .card-meta {
    display: flex; gap: 20px; flex-wrap: wrap;
    padding: 14px 0;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .meta-item { display: flex; flex-direction: column; gap: 3px; }
  .meta-lbl { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .meta-val { font-size: 13px; color: var(--cream); font-weight: 400; }

  .card-actions { display: flex; gap: 10px; }

  .btn-play {
    flex: 1;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 13px 20px;
    background: var(--gold-dk);
    border: 1px solid var(--gold-dk);
    color: var(--cream);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px; letter-spacing: 3px;
    text-decoration: none;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    cursor: pointer;
  }
  .btn-play:hover { background: var(--gold); border-color: var(--gold); color: var(--bg); }

  .btn-next {
    padding: 13px 20px;
    background: transparent;
    border: 1px solid var(--border-hi);
    color: var(--muted);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px; letter-spacing: 3px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .btn-next:hover { border-color: var(--gold-dk); color: var(--gold-lt); }
  .btn-next:disabled { opacity: 0.3; cursor: not-allowed; }

  .steam-note {
    display: none;
    margin-top: 10px;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.5px;
  }
  .steam-note.visible { display: block; }
  .steam-note a { color: var(--gold); text-decoration: none; }
  .steam-note a:hover { text-decoration: underline; }

  .footer {
    margin-top: 52px;
    font-size: 11px; color: var(--border-hi);
    letter-spacing: 2px; text-transform: uppercase;
    text-align: center;
  }

  @media (max-width: 400px) {
    .card-actions { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="page-wrap">

  <header class="site-header">
    <div class="disc-ring">
      <svg id="discSvg" viewBox="0 0 68 68" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="34" cy="34" r="32" stroke="#3d3530" stroke-width="1"/>
        <circle cx="34" cy="34" r="24" stroke="#2a2420" stroke-width="0.5"/>
        <circle cx="34" cy="34" r="15" stroke="#2a2420" stroke-width="0.5"/>
        <path d="M34 2 A32 32 0 0 1 64 50" stroke="#c8922a" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M34 2 A32 32 0 0 0 4 50" stroke="#8a5f14" stroke-width="1" stroke-linecap="round"/>
        <circle cx="34" cy="34" r="5" fill="#0e0c0a" stroke="#c8922a" stroke-width="1"/>
        <circle cx="34" cy="34" r="2" fill="#c8922a"/>
      </svg>
    </div>
    <div class="site-name">Demo Disc</div>
    <p class="site-sub">A random Steam demo, every spin</p>
  </header>

  <div class="main">

    <div class="error-msg" id="errorMsg"></div>

    <button class="spin-btn" id="spinBtn" onclick="getRandomDemo()">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <path d="M9 1v4M9 13v4M1 9h4M13 9h4M3.2 3.2l2.8 2.8M12 12l2.8 2.8M3.2 14.8l2.8-2.8M12 6l2.8-2.8"/>
      </svg>
      <span id="spinLabel">Spin the Disc</span>
    </button>

    <div class="loading" id="loading">
      <div class="loading-label">Reading disc&hellip;</div>
      <div class="loading-track"><div class="loading-bar"></div></div>
    </div>

    <div class="game-card" id="gameCard">
      <div class="card-img-wrap">
        <div class="card-img-placeholder" id="imgPlaceholder">
          <svg width="44" height="44" viewBox="0 0 44 44" fill="none" opacity="0.12">
            <circle cx="22" cy="22" r="20" stroke="#c8922a" stroke-width="1.2"/>
            <circle cx="22" cy="22" r="12" stroke="#c8922a" stroke-width="0.5"/>
            <circle cx="22" cy="22" r="3" fill="#c8922a"/>
          </svg>
        </div>
        <img id="gameImg" class="card-img" alt=""/>
        <div class="card-tags" id="cardTags"></div>
      </div>

      <div class="card-body">
        <div class="card-title" id="gameTitle">—</div>
        <div class="card-dev"   id="gameDev">—</div>
        <p  class="card-desc"  id="gameDesc">—</p>
        <div class="card-meta" id="cardMeta"></div>
        <div class="card-actions">
          <a class="btn-play" id="playBtn" href="#" target="_blank" rel="noopener noreferrer">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="currentColor"><path d="M2 1.5l9 5-9 5v-10z"/></svg>
            Install Demo Free
          </a>
          <button class="btn-next" id="nextBtn" onclick="getRandomDemo()">Next ›</button>
        </div>
        <p class="steam-note" id="steamNote">
          Button opens Steam. Or <a id="storeLink" href="#" target="_blank" rel="noopener noreferrer">view on Steam store page</a>.
        </p>
      </div>
    </div>

  </div>

  <footer class="footer">Demo Disc &mdash; Like a magazine cover disc, but infinite</footer>
</div>

<script>
  // ── Demo app ID pool ─────────────────────────────────────────────────────
  // Real Steam demos covering a wide range of genres.
  // To add more: find the appID in any Steam URL, e.g.
  // store.steampowered.com/app/2358720 → appID is 2358720
  const DEMO_IDS = [
    2358720,  // Balatro
    1449850,  // Loop Hero
    1596590,  // Chained Echoes
    1659420,  // Signalis
    1962830,  // Vampire Survivors
    1782610,  // Nobody Saves the World
    1850500,  // Citizen Sleeper
    2046490,  // OlliOlli World
    1973260,  // Neon White
    2280430,  // Dave the Diver
    1920760,  // Stray
    2172010,  // Planet of Lana
    1908010,  // Pentiment
    2153410,  // A Plague Tale: Requiem
    1913870,  // As Dusk Falls
    2017680,  // Victoria 3
    1551360,  // Forager
    2138710,  // Tinykin
    1986660,  // Tunic
    2076640,  // Norco
    2009760,  // Unpacking
    2029760,  // Prodeus
    1962760,  // Dome Keeper
    1865940,  // Midnight Fight Express
    1979690,  // Rollerdrome
    2180000,  // High on Life
    2039210,  // Evil West
    2164890,  // The Last Case of Benedict Fox
    2177820,  // Ghostlore
    2217680,  // Venba
    1790600,  // Sable
    1621690,  // Silt
    1985810,  // Potionomics
    1659400,  // Rogue Legacy 2
    1675250,  // Garden Story
    1878840,  // Cursed to Golf
    1891050,  // Behind the Frame
    2037000,  // Strange Horticulture
  ];

  let lastId = null;

  // ── CORS proxies (tried in order if one fails) ───────────────────────────
  // These are free services that forward requests to Steam on our behalf.
  const PROXIES = [
    id => `https://corsproxy.io/?url=${encodeURIComponent(`https://store.steampowered.com/api/appdetails?appids=${id}&cc=us&l=en`)}`,
    id => `https://api.allorigins.win/get?url=${encodeURIComponent(`https://store.steampowered.com/api/appdetails?appids=${id}&cc=us&l=en`)}`,
  ];

  async function fetchSteamData(appId) {
    for (const makeUrl of PROXIES) {
      try {
        const res = await fetch(makeUrl(appId), { signal: AbortSignal.timeout(9000) });
        if (!res.ok) continue;

        const json = await res.json();
        // allorigins wraps in { contents: "..." }
        const raw = json.contents ? JSON.parse(json.contents) : json;
        const d = raw[String(appId)]?.data;
        if (!d) continue;

        return {
          name:              d.name,
          short_description: d.short_description,
          developers:        d.developers || [],
          genres:            (d.genres || []).map(g => g.description),
          release_date:      d.release_date?.date || '—',
          platforms:         d.platforms || {},
          header_image:      `https://cdn.akamai.steamstatic.com/steam/apps/${appId}/header.jpg`,
        };
      } catch (_) {
        // try next proxy
      }
    }

    // Both proxies failed — image still works, text will be minimal
    return {
      name:              null,
      short_description: 'Visit the Steam page for the full description.',
      developers:        [],
      genres:            [],
      release_date:      '—',
      platforms:         { windows: true },
      header_image:      `https://cdn.akamai.steamstatic.com/steam/apps/${appId}/header.jpg`,
    };
  }

  // ── Main ─────────────────────────────────────────────────────────────────
  async function getRandomDemo() {
    document.getElementById('errorMsg').classList.remove('visible');
    setLoading(true);

    const pool  = DEMO_IDS.filter(id => id !== lastId);
    const appId = pool[Math.floor(Math.random() * pool.length)];
    lastId = appId;

    try {
      const data = await fetchSteamData(appId);
      renderCard(data, appId);
    } catch (e) {
      showError('Something went wrong — give it another spin.');
      setLoading(false);
    }
  }

  // ── Render card ──────────────────────────────────────────────────────────
  function renderCard(data, appId) {
    const noData = !data.name;
    const name   = data.name || `Steam Demo — App ${appId}`;

    document.getElementById('gameTitle').textContent = name;
    document.getElementById('gameDev').textContent   = data.developers[0] || '—';
    document.getElementById('gameDesc').textContent  = data.short_description || 'A free demo on Steam.';

    // Genre tags
    const tagsEl = document.getElementById('cardTags');
    tagsEl.innerHTML = '<span class="tag tag-free">Free Demo</span>';
    data.genres.slice(0, 3).forEach(g => {
      const s = document.createElement('span');
      s.className = 'tag';
      s.textContent = g;
      tagsEl.appendChild(s);
    });

    // Meta row
    const p = data.platforms;
    const platStr = [p.windows && 'Windows', p.mac && 'Mac', p.linux && 'Linux']
      .filter(Boolean).join(' · ') || 'PC';
    document.getElementById('cardMeta').innerHTML = `
      <div class="meta-item">
        <span class="meta-lbl">Platform</span>
        <span class="meta-val">${platStr}</span>
      </div>
      <div class="meta-item">
        <span class="meta-lbl">Released</span>
        <span class="meta-val">${data.release_date}</span>
      </div>
      <div class="meta-item">
        <span class="meta-lbl">Price</span>
        <span class="meta-val" style="color:var(--gold-lt)">Free</span>
      </div>`;

    // Image — Steam CDN is always public, no login needed
    const img = document.getElementById('gameImg');
    img.classList.remove('loaded');
    img.style.display = 'block';
    document.getElementById('imgPlaceholder').style.display = 'flex';
    img.alt = name;
    img.onload  = () => {
      img.classList.add('loaded');
      document.getElementById('imgPlaceholder').style.display = 'none';
    };
    img.onerror = () => {
      img.style.display = 'none';
    };
    img.src = data.header_image;

    // Links
    document.getElementById('playBtn').href   = `steam://install/${appId}`;
    document.getElementById('storeLink').href = `https://store.steampowered.com/app/${appId}`;
    document.getElementById('steamNote').classList.add('visible');

    // Show warning if proxy failed but still show the card
    if (noData) {
      showError("Couldn't load details this time, but here's the game! Click the store link below for more info.");
    } else {
      document.getElementById('errorMsg').classList.remove('visible');
    }

    document.getElementById('gameCard').classList.add('visible');
    document.getElementById('spinLabel').textContent = 'Spin Again';
    setLoading(false);
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function setLoading(on) {
    document.getElementById('spinBtn').disabled = on;
    document.getElementById('nextBtn').disabled = on;
    document.getElementById('loading').classList.toggle('visible', on);
    document.getElementById('discSvg').classList.toggle('spinning', on);
    if (on) document.getElementById('gameCard').classList.remove('visible');
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = '⚠ ' + msg;
    el.classList.add('visible');
  }
</script>
</body>
</html>
